<header class="header">
  <div class="header-inner">
    <a routerLink="/" class="logo">
      <span class="logo-icon">💕</span>
      <span class="logo-text">DateApp</span>
    </a>

    @if (loggedIn) {
      <nav class="nav">
        <a routerLink="/users" routerLinkActive="active" class="nav-link">Profiles</a>
        <a routerLink="/requests" routerLinkActive="active" class="nav-link">
          Likes
        </a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">My Profile</a>
      </nav>
      <div class="user-menu">
        <div class="avatar-wrap">
          @if (user?.photoUrl) {
            <img [src]="user?.photoUrl" class="avatar" alt="Photo" (error)="$any($event.target).src='https://ui-avatars.com/api/?name=' + user?.name + '&background=e91e8c&color=fff'">
          } @else {
            <div class="avatar-placeholder">{{ user?.name?.charAt(0) }}</div>
          }
        </div>
        <span class="user-name">{{ user?.name }}</span>
        <button (click)="logout()" class="logout-btn">Sign Out</button>
      </div>
    } @else {
      <div class="auth-btns">
        <a routerLink="/login" class="btn-outline">Sign In</a>
        <a routerLink="/register" class="btn-primary">Sign Up</a>
      </div>
    }
  </div>
</header>
