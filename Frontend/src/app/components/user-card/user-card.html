<div class="card" [class.liked]="liked" [class.disliked]="disliked">

  <!-- Match animation banner -->
  @if (isMatch) {
    <div class="match-banner">
      <span class="match-banner-text">💞 It's a Match!</span>
    </div>
  }

  <div class="card-photo">
    <img
      [src]="user.photoUrl || 'https://ui-avatars.com/api/?name=' + user.name + '&size=300&background=fce7f3&color=e91e8c'"
      [alt]="user.name"
      (error)="$any($event.target).src='https://ui-avatars.com/api/?name=' + user.name + '&size=300&background=fce7f3&color=e91e8c'"
    >
    <div class="card-badge">{{ user.age }}</div>
  </div>

  <div class="card-body">
    <div class="card-info">
      <h3 class="card-name">{{ user.name }}</h3>
      @if (user.city) {
        <span class="card-city">📍 {{ user.city }}</span>
      }
    </div>

    @if (user.bio) {
      <p class="card-bio">{{ user.bio }}</p>
    }

    @if (error) {
      <p class="card-error">⚠️ {{ error }}</p>
    }

    <!-- Like / Dislike buttons -->
    @if (!liked && !disliked) {
      <div class="action-btns">
        <button class="dislike-btn" (click)="sendDislike()" [disabled]="loading" title="Dislike">
          ✕
        </button>
        <button class="like-btn" (click)="sendLike()" [disabled]="loading" title="Like">
          @if (loading) { ⏳ } @else { ❤️ }
        </button>
      </div>
    }

    @if (liked && !disliked) {
      <div class="status-row liked-status">💖 Liked!</div>
    }

    @if (disliked) {
      <div class="status-row disliked-status">Passed</div>
    }
  </div>
</div>
