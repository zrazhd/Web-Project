<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">💘 DateApp</h1>
    <h2 class="auth-subtitle">Sign in</h2>

    <form (ngSubmit)="submit()" #form="ngForm">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="you@example.com"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••"
        />
      </div>

      @if (error) {
        <p class="auth-error">{{ error }}</p>
      }

      <button type="submit" class="auth-btn" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-link">No account? <a routerLink="/register">Register</a></p>
  </div>
</div>
