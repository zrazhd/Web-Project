<div class="auth-page">
  <div class="auth-deco"></div>
  <div class="auth-card wide">
    <div class="auth-header">
      <div class="heart-icon">🌸</div>
      <h1>Create Your Profile</h1>
      <p>Tell us about yourself — find your person</p>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" [(ngModel)]="newUser.name" placeholder="What's your name?">
      </div>

      <div class="form-group">
        <label>Age *</label>
        <input type="number" [(ngModel)]="newUser.age" min="18" max="99" placeholder="18">
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="newUser.email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" [(ngModel)]="newUser.password" placeholder="At least 6 characters">
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" [(ngModel)]="newUser.city" placeholder="New York, London...">
      </div>

      <div class="form-group">
        <label>Gender *</label>
        <select [(ngModel)]="newUser.gender">
          <option value="">Select gender</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group full-col">
        <label>Photo URL</label>
        <input type="text" [(ngModel)]="newUser.photoUrl" placeholder="https://...">
        @if (newUser.photoUrl) {
          <img [src]="newUser.photoUrl" class="photo-preview" alt="Preview"
               (error)="$any($event.target).style.display='none'">
        }
      </div>

      <div class="form-group full-col">
        <label>Interests</label>
        <input type="text" [(ngModel)]="newUser.interests" placeholder="Coffee, travel, movies...">
      </div>

      <div class="form-group full-col">
        <label>About Me</label>
        <textarea [(ngModel)]="newUser.bio" rows="3" placeholder="Tell something interesting about yourself..."></textarea>
      </div>
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button class="btn-primary submit-btn" (click)="onRegister()" [disabled]="loading">
      @if (loading) { Creating profile... }
      @else { Sign Up 💕 }
    </button>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
